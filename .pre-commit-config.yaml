repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-json
      - id: check-toml
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-case-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix, --extend-select, SIM]
        files: ^backend/
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --explicit-package-bases, backend]
        additional_dependencies:
          - pydantic>=2.5.0
          - types-PyYAML
          - types-requests
        exclude: tests/
        pass_filenames: false

  - repo: local
    hooks:
      - id: check-arch-imports
        name: Check architecture import rules
        entry: python scripts/check_arch_imports.py
        language: python
        pass_filenames: false
        always_run: true

      - id: udr-verify
        name: UDR lock file verification
        description: Validate lock file integrity and package consistency
        entry: udr verify
        language: system
        pass_filenames: false
