---
# SealedSecret example for GitOps secret management
#
# How to create a SealedSecret from a plain Secret:
#   1.  Create a local Secret YAML (without kubectl apply):
#       kubectl create secret generic my-secret \
#         --namespace universal-dependency-resolver \
#         --dry-run=client \
#         --from-literal=MY_KEY=my-value \
#         -o json > secret.json
#
#   2.  Seal it with kubeseal (cluster controller must be running):
#       kubeseal --namespace universal-dependency-resolver \
#         < secret.json > sealed-secret.json
#
#   3.  Convert the JSON output back to YAML or use the JSON directly.
#
# The sealed data below is a dummy placeholder -- replace it by running the
# steps above against your own cluster's SealedSecret controller.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: universal-dependency-resolver-secrets
  namespace: universal-dependency-resolver
  # Annotations are optional but useful for GitOps tooling.
  # annotations:
  #   sealedsecrets.bitnami.com/managed: "true"
spec:
  # template replicates the top-level Secret metadata/type into the
  # unsealed Secret so you don't need a separate Secret manifest.
  template:
    metadata:
      name: universal-dependency-resolver-secrets
      namespace: universal-dependency-resolver
    type: Opaque
  # encryptedData is produced by kubeseal.  Replace with real output.
  encryptedData:
    DATABASE_URL: ""
    REDIS_URL: ""
    SECRET_KEY: ""
    POSTGRES_PASSWORD: ""
