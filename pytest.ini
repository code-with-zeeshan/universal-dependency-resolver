[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (require PostgreSQL, Redis)
    e2e: End-to-end tests (require full stack)
    slow: Slow tests (more than 5 seconds)
    external_api: Tests that call external APIs
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
asyncio_mode = auto
