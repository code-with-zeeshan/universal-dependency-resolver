name: Security Audit
on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit
        continue-on-error: true
        run: pip-audit --strict --progress-spinner off --desc on . 2>&1 | tee pip-audit-report.txt

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.txt

      - name: pip-audit --fix (generate fixed requirements)
        continue-on-error: true
        run: |
          pip-audit --strict --fix --progress-spinner off --desc on . 2>&1 | tee pip-audit-fix-report.txt
          # pip-audit --fix outputs a requirements file with pinned safe versions
          echo "Generated fix artifacts — review pip-audit-fix-report.txt"
        timeout-minutes: 10

      - name: Upload pip-audit fix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-fix-report
          path: pip-audit-fix-report.txt

      - name: License compliance check
        continue-on-error: true
        run: |
          pip install pip-licenses 2>/dev/null
          pip-licenses --format=markdown --order=license 2>&1 | tee license-report.md || echo "pip-licenses not available — skipping"

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: license-report.md

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install npm audit tooling
        run: npm install -g npm-audit-reporter

      - name: npm audit (desktop)
        continue-on-error: true
        working-directory: desktop
        run: |
          npm audit --audit-level=high 2>&1 | tee npm-audit-report.txt

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: desktop/npm-audit-report.txt

      - name: Create issue on critical findings
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = 'Security audit found vulnerabilities';
            const body = 'The weekly security audit found vulnerabilities. Check the workflow artifacts for details.\n\n' +
              'See: ' + context.serverUrl + '/' + context.repo + '/actions/runs/' + context.runId;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['security'],
            });
            const existing = issues.data.find(i => i.title === title);
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security'],
              });
            }
