name: Build Desktop Electron App

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop dependencies
        run: npm install
        working-directory: desktop

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies and build standalone binary
        shell: bash
        run: |
          pip install pyinstaller
          pip install -e .
          Z3_LIB=$(python3 -c "import z3, os, sys; ext = 'dll' if sys.platform in ('win32', 'cygwin') else 'dylib' if sys.platform == 'darwin' else 'so'; print(os.path.join(os.path.dirname(z3.__file__), 'lib', f'libz3.{ext}'))")
          pyinstaller --onefile --noconsole --noconfirm \
            --name udr-backend \
            --add-binary "$Z3_LIB:z3/lib/" \
            --hidden-import jose.jwt \
            --hidden-import passlib.handlers.bcrypt --hidden-import bcrypt \
            --distpath backend/dist \
            --workpath ${{ runner.temp }}/pyibuild \
            backend/run.py

      - name: Build Electron app
        run: npx electron-builder --publish=never
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: udr-desktop-${{ matrix.os }}
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb
            desktop/release/*.dmg
            desktop/release/*.exe
            desktop/release/*.zip
            desktop/release/*.dmg.blockmap
            desktop/release/*.zip.blockmap
          retention-days: 30
