name: Build Desktop Electron App

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        arch: [x64]
        include:
          - os: macos-latest
            arch: x64
          - os: macos-latest
            arch: arm64
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop dependencies
        run: npm install
        working-directory: desktop

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install UPX compressor
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq upx-ucl 2>/dev/null || true
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install upx 2>/dev/null || true
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            choco install upx -y 2>/dev/null || true
          fi
          which upx && upx --version | head -1 || echo "UPX not available"

      - name: Install backend dependencies and build standalone binary
        shell: bash
        run: |
          pip install pyinstaller
          pip install -e ".[security,system]"
          Z3_LIB=$(python3 -c "import z3, os, sys; ext = 'dll' if sys.platform in ('win32', 'cygwin') else 'dylib' if sys.platform == 'darwin' else 'so'; print(os.path.join(os.path.dirname(z3.__file__), 'lib', f'libz3.{ext}'))")
          UPX_FLAG=""
          which upx >/dev/null 2>&1 && UPX_FLAG="--upx-dir $(dirname $(which upx))"
          pyinstaller --onefile --noconsole --noconfirm \
            --name udr-backend \
            $UPX_FLAG \
            --add-binary "$Z3_LIB:z3/lib/" \
            --hidden-import jose.jwt \
            --hidden-import passlib.handlers.bcrypt --hidden-import bcrypt \
            --distpath backend/dist \
            --workpath ${{ runner.temp }}/pyibuild \
            backend/run.py

      - name: Build Electron app
        shell: bash
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npx electron-builder --mac --arm64 --publish=never
          else
            npx electron-builder --publish=never
          fi
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: udr-desktop-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb
            desktop/release/*.dmg
            desktop/release/*.exe
            desktop/release/*.zip
            desktop/release/*.dmg.blockmap
            desktop/release/*.zip.blockmap
          retention-days: 30

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            shopt -s nullglob
            for f in desktop/release/*; do
              base=$(basename "$f")
              case "$base" in
                *.dmg|*.exe|*.AppImage|*.deb)
                  echo "Uploading $base to release $TAG..."
                  gh release upload "$TAG" "$f" --clobber
                  ;;
                *)
                  echo "Skipping $base"
                  ;;
              esac
            done
          else
            echo "Skipping release upload (event: ${{ github.event_name }})"
          fi
