name: Build Desktop Electron App

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop dependencies
        run: npm install
        working-directory: desktop

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Build Electron app
        run: npx electron-builder --publish=never
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: udr-desktop-${{ matrix.os }}
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb
            desktop/release/*.dmg
            desktop/release/*.exe
            desktop/release/*.zip
            desktop/release/*.dmg.blockmap
            desktop/release/*.zip.blockmap
          retention-days: 30
