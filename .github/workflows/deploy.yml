# .github/workflows/deploy.yml
name: Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to deploy'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Determine deployment environment and version
  prepare:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      version: ${{ steps.env.outputs.version }}
      should-deploy: ${{ steps.env.outputs.should-deploy }}
    
    steps:
    - name: Determine environment and version
      id: env
      run: |
        # Determine environment
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          echo "should-deploy=true" >> $GITHUB_OUTPUT
        elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
          echo "environment=staging" >> $GITHUB_OUTPUT
          echo "should-deploy=true" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          echo "environment=production" >> $GITHUB_OUTPUT
          echo "should-deploy=true" >> $GITHUB_OUTPUT
        else
          echo "should-deploy=false" >> $GITHUB_OUTPUT
        fi
        
        # Determine version
        if [ "${{ github.event.inputs.version }}" != "" ]; then
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
        fi

  # Deploy to Kubernetes
  deploy-k8s:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should-deploy == 'true'
    environment: ${{ needs.prepare.outputs.environment }}
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Deploy to Kubernetes
      run: |
        # Set image tags
        export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ needs.prepare.outputs.version }}"
        export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ needs.prepare.outputs.version }}"
        export ENVIRONMENT="${{ needs.prepare.outputs.environment }}"
        
        # Apply Kubernetes manifests
        envsubst < k8s/namespace.yaml | kubectl apply -f -
        envsubst < k8s/configmap.yaml | kubectl apply -f -
        envsubst < k8s/secrets.yaml | kubectl apply -f -
        envsubst < k8s/postgres.yaml | kubectl apply -f -
        envsubst < k8s/redis.yaml | kubectl apply -f -
        envsubst < k8s/backend.yaml | kubectl apply -f -
        envsubst < k8s/frontend.yaml | kubectl apply -f -
        envsubst < k8s/ingress.yaml | kubectl apply -f -

    - name: Wait for deployment
      run: |
        kubectl rollout status deployment/backend -n ${{ needs.prepare.outputs.environment }}
        kubectl rollout status deployment/frontend -n ${{ needs.prepare.outputs.environment }}

    - name: Run database migrations
      run: |
        kubectl exec -n ${{ needs.prepare.outputs.environment }} \
          deployment/backend -- alembic upgrade head

    - name: Verify deployment
      run: |
        # Get service URL
        if [ "${{ needs.prepare.outputs.environment }}" = "production" ]; then
          echo "SERVICE_URL=${{ secrets.PROD_API_URL }}" >> $GITHUB_ENV
        else
          echo "SERVICE_URL=${{ secrets.STAGING_API_URL }}" >> $GITHUB_ENV
        fi
        
        # Health check
        curl -f "$SERVICE_URL/api/v1/health" || exit 1
        
        echo "Deployment verified successfully!"

  # Deploy to Docker Swarm (Alternative)
  deploy-swarm:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should-deploy == 'true' && false  # Disabled by default
    environment: ${{ needs.prepare.outputs.environment }}
    
    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Docker Swarm
      run: |
        # Connect to Docker Swarm manager
        docker context create remote --docker "host=ssh://${{ secrets.SWARM_HOST }}"
        docker context use remote
        
        # Set environment variables
        export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ needs.prepare.outputs.version }}"
        export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ needs.prepare.outputs.version }}"
        export ENVIRONMENT="${{ needs.prepare.outputs.environment }}"
        
        # Deploy stack
        envsubst < docker-compose.prod.yml > docker-compose.deploy.yml
        docker stack deploy --compose-file docker-compose.deploy.yml udr-${{ needs.prepare.outputs.environment }}
        
        # Wait for deployment
        sleep 30
        
        # Verify deployment
        docker service ls

  # Deploy to AWS ECS (Alternative)
  deploy-ecs:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should-deploy == 'true' && false  # Disabled by default
    environment: ${{ needs.prepare.outputs.environment }}
    
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Deploy to ECS
      run: |
        # Update ECS service with new image
        aws ecs update-service \
          --cluster udr-${{ needs.prepare.outputs.environment }} \
          --service backend \
          --force-new-deployment \
          --task-definition backend:${{ needs.prepare.outputs.version }}
        
        aws ecs update-service \
          --cluster udr-${{ needs.prepare.outputs.environment }} \
          --service frontend \
          --force-new-deployment \
          --task-definition frontend:${{ needs.prepare.outputs.version }}
        
        # Wait for deployment
        aws ecs wait services-stable \
          --cluster udr-${{ needs.prepare.outputs.environment }} \
          --services backend frontend

  # Database Migration Job
  migrate-database:
    runs-on: ubuntu-latest
    needs: [prepare, deploy-k8s]
    if: needs.prepare.outputs.should-deploy == 'true'
    environment: ${{ needs.prepare.outputs.environment }}
    
    steps:
    - uses: actions/checkout@v4

    - name: Run database migrations
      run: |
        # For Kubernetes deployment
        if command -v kubectl &> /dev/null; then
          kubectl exec -n ${{ needs.prepare.outputs.environment }} \
            deployment/backend -- alembic upgrade head
        fi
        
        # For Docker Swarm deployment
        if command -v docker &> /dev/null; then
          docker exec $(docker ps -q -f name=udr-${{ needs.prepare.outputs.environment }}_backend) \
            alembic upgrade head
        fi

  # Post-deployment tests
  post-deploy-tests:
    runs-on: ubuntu-latest
    needs: [prepare, deploy-k8s, migrate-database]
    if: needs.prepare.outputs.should-deploy == 'true'
    
    steps:
    - uses: actions/checkout@v4

    - name: Set service URL
      id: url
      run: |
        if [ "${{ needs.prepare.outputs.environment }}" = "production" ]; then
          echo "url=https://api.yourdomain.com" >> $GITHUB_OUTPUT
        else
          echo "url=https://staging-api.yourdomain.com" >> $GITHUB_OUTPUT
        fi

    - name: Health check
      run: |
        curl -f "${{ steps.url.outputs.url }}/api/v1/health"

    - name: API smoke tests
      run: |
        # Test critical endpoints
        curl -f "${{ steps.url.outputs.url }}/api/v1/packages/search?q=pytest"
        curl -f "${{ steps.url.outputs.url }}/api/v1/system/info"
        curl -f "${{ steps.url.outputs.url }}/api/v1/packages/export-formats"

    - name: Performance check
      run: |
        # Simple performance test
        time curl -f "${{ steps.url.outputs.url }}/api/v1/health"

  # Rollback capability
  rollback:
    runs-on: ubuntu-latest
    if: failure() && github.event_name != 'workflow_dispatch'
    needs: [prepare, deploy-k8s, post-deploy-tests]
    environment: ${{ needs.prepare.outputs.environment }}
    
    steps:
    - name: Rollback deployment
      run: |
        echo "Deployment failed, initiating rollback..."
        
        # For Kubernetes
        if command -v kubectl &> /dev/null; then
          kubectl rollout undo deployment/backend -n ${{ needs.prepare.outputs.environment }}
          kubectl rollout undo deployment/frontend -n ${{ needs.prepare.outputs.environment }}
          
          # Wait for rollback to complete
          kubectl rollout status deployment/backend -n ${{ needs.prepare.outputs.environment }}
          kubectl rollout status deployment/frontend -n ${{ needs.prepare.outputs.environment }}
        fi

  # Update deployment status
  update-status:
    runs-on: ubuntu-latest
    needs: [prepare, deploy-k8s, post-deploy-tests]
    if: always() && needs.prepare.outputs.should-deploy == 'true'
    
    steps:
    - name: Update deployment status
      uses: actions/github-script@v7
      with:
        script: |
          const { data: deployment } = await github.rest.repos.createDeployment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.sha,
            environment: '${{ needs.prepare.outputs.environment }}',
            auto_merge: false,
            required_contexts: []
          });
          
          const status = '${{ job.status }}' === 'success' ? 'success' : 'failure';
          
          await github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: deployment.id,
            state: status,
            environment_url: status === 'success' ? '${{ steps.url.outputs.url }}' : undefined
          });

  # Notifications
  notify-deployment:
    runs-on: ubuntu-latest
    needs: [prepare, deploy-k8s, post-deploy-tests]
    if: always() && needs.prepare.outputs.should-deploy == 'true'
    
    steps:
    - name: Notify Slack on success
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: success
        channel: '#deployments'
        text: |
          🚀 Deployment to ${{ needs.prepare.outputs.environment }} completed successfully!
          Version: ${{ needs.prepare.outputs.version }}
          Repository: ${{ github.repository }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: Notify Slack on failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#deployments'
        text: |
          ❌ Deployment to ${{ needs.prepare.outputs.environment }} failed!
          Version: ${{ needs.prepare.outputs.version }}
          Repository: ${{ github.repository }}
          Please check the logs and take necessary action.
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: Create GitHub issue on failure
      if: failure() && needs.prepare.outputs.environment == 'production'
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `🚨 Production deployment failed - ${context.sha.slice(0, 7)}`,
            body: `
              Production deployment failed for commit ${context.sha}.
              
              **Environment:** ${{ needs.prepare.outputs.environment }}
              **Version:** ${{ needs.prepare.outputs.version }}
              **Workflow:** ${context.workflow}
              **Run:** ${context.runNumber}
              
              Please investigate and resolve the issue immediately.
              
              [View workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})
            `,
            labels: ['bug', 'priority:high', 'deployment']
          });