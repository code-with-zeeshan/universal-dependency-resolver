name: Publish to PyPI & Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || (startsWith(github.ref_name, 'v') && !startsWith(github.ref_name, 'desktop-v'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CI passed for this commit
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          echo "Checking CI status for commit $SHA..."
          CONCLUSION=$(gh run list --workflow CI --commit "$SHA" --json conclusion,status --jq \
            '[.[] | select(.status == "completed")] | .[0].conclusion // "none"')
          echo "CI conclusion: $CONCLUSION"
          if [ "$CONCLUSION" != "success" ]; then
            echo "❌ CI did not pass for this commit (conclusion: $CONCLUSION)."
            echo "   Publishing is blocked until CI passes."
            echo "   To bypass, use 'workflow_dispatch' or push a green commit and create a new release."
            exit 1
          fi
          echo "✅ CI passed for commit $SHA"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build==1.5.0

      - name: Build distributions
        run: python -m build

      - name: Verify built wheel
        run: |
          pip install dist/*.whl
          python -c "from backend import __version__; print(f'Wheel OK: {__version__}')"
          pip uninstall -y ud-resolver

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Upload wheel to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} dist/*.whl dist/*.tar.gz --clobber
