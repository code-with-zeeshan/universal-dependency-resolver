name: UDR Lock Check
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lock-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install UDR
        run: pip install -e .
      - name: Check lock file freshness
        run: |
          if [ -f udr.lock ]; then
            udr lock --check
          else
            echo "No udr.lock found — skipping lock-check"
          fi
