name: UDR Lock Check
on: [push, pull_request]
jobs:
  lock-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install UDR
        run: pip install udr
      - name: Check lock file freshness
        run: udr lock --check
