name: Badge Update
on:
  schedule:
    - cron: "0 6 * * 0"  # Every Sunday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  badge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,system]"

      - name: Run tests and extract count
        id: test_count
        env:
          TESTING: "true"
          PYTHONPATH: .
        run: |
          output=$(python -m pytest tests/unit/ --co -q 2>&1 | tail -1)
          echo "raw=$output"
          # Extract the number of collected tests (e.g. "1000 passed" or "1000 passed, 2 skipped")
          count=$(echo "$output" | grep -oP '^\d+' || echo "0")
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Test count: $count"

      - name: Determine health status
        id: health
        run: |
          count=${{ steps.test_count.outputs.count }}
          if [ "$count" -gt 0 ] 2>/dev/null; then
            echo "status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "status=failing" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate test count badge
        run: |
          count=${{ steps.test_count.outputs.count }}
          python scripts/generate_badge.py \
            --label "tests" \
            --value "$count" \
            --color "green" \
            --output "badges/tests.svg"

      - name: Generate health badge
        run: |
          status=${{ steps.health.outputs.status }}
          python scripts/generate_badge.py \
            --label "health" \
            --value "$status" \
            --output "badges/health.svg"

      - name: Commit badges
        run: |
          mkdir -p badges
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/
          git diff --cached --quiet || git commit -m "chore: update status badges [skip ci]"
          git push
