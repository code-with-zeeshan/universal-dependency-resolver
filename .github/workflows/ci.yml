name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,system,postgres]"

      - name: Lint
        continue-on-error: true
        run: |
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check --diff backend

      - name: Type check
        continue-on-error: true
        run: |
          mypy backend --ignore-missing-imports

      - name: Run tests
        env:
          TESTING: "true"
          SECRET_KEY: test-secret-key-for-ci
          PYTHONPATH: .
          ENABLE_CSRF: "false"
        run: |
          python -m pytest tests/unit/ -v --tb=long -k "not data_source" --cov=backend --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./coverage.xml
          flags: backend
          fail_ci_if_error: false

  build-desktop:
    needs: [test]
    if: github.event_name == 'push'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        arch: [x64]
        include:
          - os: macos-latest
            arch: x64
          - os: macos-14
            arch: arm64
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop dependencies
        run: npm install
        working-directory: desktop

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UPX
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq upx-ucl 2>/dev/null || true
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install upx 2>/dev/null || true
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            choco install upx -y 2>/dev/null || true
          fi

      - name: Build backend binary
        shell: bash
        run: |
          pip install pyinstaller
          pip install -e ".[system]"
          Z3_LIB=$(python3 -c "import z3, os, sys; ext = 'dll' if sys.platform in ('win32', 'cygwin') else 'dylib' if sys.platform == 'darwin' else 'so'; print(os.path.join(os.path.dirname(z3.__file__), 'lib', f'libz3.{ext}'))")
          UPX_FLAG=""
          which upx >/dev/null 2>&1 && UPX_FLAG="--upx-dir $(dirname $(which upx))"
          pyinstaller --onedir --noconsole --noconfirm \
            --name udr-backend \
            $UPX_FLAG \
            --add-binary "$Z3_LIB:z3/lib/" \
            --distpath backend/dist \
            --workpath ${{ runner.temp }}/pyibuild \
            backend/run.py

      - name: Build Electron app
        shell: bash
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npx electron-builder --mac --arm64 --publish=never
          else
            npx electron-builder --publish=never
          fi
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: udr-desktop-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb
            desktop/release/*.dmg
            desktop/release/*.exe
          retention-days: 30
