name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,system,postgres]"

      - name: Validate YAML
        run: |
          pip install yamllint
          yamllint .github/workflows/

      - name: Lint
        run: |
          ruff check backend/
          ruff format --check --diff backend/

      - name: Type check
        run: |
          mypy backend --ignore-missing-imports

      - name: Run unit tests
        env:
          TESTING: "true"
          SECRET_KEY: test-secret-key-for-ci
          PYTHONPATH: .
          ENABLE_CSRF: "false"
        run: |
          python -m pytest tests/unit/ -v --tb=long -k "not data_source" --cov=backend.core --cov=backend.api --cov=backend.cli --cov=backend.settings --cov=backend.manifest_detector --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: CLI end-to-end smoke tests
        env:
          TESTING: "true"
          PYTHONPATH: .
        run: |
          bash tests/test_cli_realworld.sh

      - name: CLI e2e tests (pytest)
        env:
          TESTING: "true"
          PYTHONPATH: .
        run: |
          # Fast subset: excludes 02,03,06,08,09,10 (expensive real-network tests covered by shell script above)
          python -m pytest tests/e2e/test_cli_realworld.py -v --tb=long -q -k "01 or 04 or 05 or 07"

      - name: Problem-statement end-to-end tests
        env:
          TESTING: "true"
          PYTHONPATH: .
        run: |
          bash tests/test_problem_statement.sh

      - name: Problem-statement e2e tests (pytest)
        env:
          TESTING: "true"
          PYTHONPATH: .
        run: |
          # Excludes 02,03,04,06 (expensive integration tests covered by shell script above)
          python -m pytest tests/e2e/test_problem_statement.py -v --tb=long -q -k "01 or 05 or 07 or 08 or 09 or 10 or 11 or 12 or 13"

      - name: Comprehensive real-world tests
        env:
          TESTING: "true"
          PYTHONPATH: .
        run: |
          python -m pytest tests/test_comprehensive.py -v --tb=short -m "e2e" -q

      - name: CLI JSON output compliance
        env:
          TESTING: "true"
          PYTHONPATH: .
        run: |
          python -m pytest tests/e2e/test_json_compliance.py -v --tb=long -q

      - name: Verify CLI imports
        run: |
          python3 -c "from backend.cli import main; print('CLI package OK')"

      - name: CLI unit tests
        env:
          TESTING: "true"
          PYTHONPATH: .
        run: |
          python -m pytest tests/cli/ -v --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./coverage.xml
          flags: backend
          fail_ci_if_error: false

  integration-tests:
    runs-on: ubuntu-latest
    needs: [test]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev,postgres,monitoring]"

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          TESTING: "true"
          SECRET_KEY: test-secret-key-for-ci
          PYTHONPATH: .
        run: |
          python -m pytest tests/integration/ -v --tb=short

  desktop-tests:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop dependencies
        run: npm install
        working-directory: desktop

      - name: Run desktop smoke tests
        run: npm test
        working-directory: desktop

  security-scan:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Snyk scan Python dependencies
        uses: snyk/actions/python@v1
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=critical

  code-quality:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  data-source-tests:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev,system]"

      - name: Run data source tests
        env:
          TESTING: "true"
          SECRET_KEY: test-secret-key-for-ci
          PYTHONPATH: .
        run: |
          python -m pytest tests/unit/ -v --tb=long -k "data_source" --cov=backend.data_sources --cov-report=term-missing
