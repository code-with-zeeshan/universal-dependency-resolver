name: Desktop Build

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'v')
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: desktop/node_modules
          key: desktop-npm-linux-${{ hashFiles('desktop/package-lock.json', 'desktop/package.json') }}
          restore-keys: |
            desktop-npm-linux-

      - name: Install desktop dependencies
        run: npm install
        working-directory: desktop

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Sync desktop version from pyproject.toml
        run: python scripts/sync-version.py

      - name: Override version from git tag (safety net)
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG_VER="${{ github.event.release.tag_name }}"
            TAG_VER="${TAG_VER#v}"
            echo "Injecting tag version: $TAG_VER"
            python3 -c "import json,sys; pkg=json.load(open('desktop/package.json')); old=pkg['version']; pkg['version']=sys.argv[1]; json.dump(pkg, open('desktop/package.json','w'), indent=2); print(f'desktop/package.json: {old} -> {sys.argv[1]} (from tag)')" "$TAG_VER"
          else
            echo "No release tag — using pyproject.toml version"
          fi

      - name: Install UPX compressor
        shell: bash
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq upx-ucl binutils xz-utils fakeroot
          which upx && upx --version | head -1 || echo "UPX not available"

      - name: Build backend binary + Electron app
        shell: bash
        run: |
          pip install pyinstaller
          pip install -e ".[system]"
          Z3_LIB=$(python3 << 'PYEOF'
          import z3, os, sys, glob
          ext_map = {'win32': '.dll', 'cygwin': '.dll', 'darwin': '.dylib'}
          ext = ext_map.get(sys.platform, '.so')
          lib_dir = os.path.join(os.path.dirname(z3.__file__), 'lib')
          if not os.path.isdir(lib_dir):
              lib_dir = os.path.join(os.path.dirname(z3.__file__))
          matches = glob.glob(os.path.join(lib_dir, f'*z3*{ext}')) or glob.glob(os.path.join(lib_dir, f'libz3*'))
          print(matches[0] if matches else os.path.join(lib_dir, f'libz3{ext}'))
          PYEOF
          )
          UPX_FLAG=""
          which upx >/dev/null 2>&1 && UPX_FLAG="--upx-dir $(dirname $(which upx))"
          pyinstaller --onedir --noconsole --noconfirm \
            --name udr-backend \
            $UPX_FLAG \
            --add-binary "$Z3_LIB:z3/lib/" \
            --distpath backend/dist \
            --workpath ${{ runner.temp }}/pyibuild \
            backend/run.py
          pushd desktop
          npm install
          npx electron-builder --linux --publish=never
          popd
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test built binary
        shell: bash
        run: |
          node --test tests/smoke.test.js
        working-directory: desktop

      - name: Headless render test (Xvfb)
        shell: bash
        run: |
          sudo apt-get install -y -qq xvfb 2>/dev/null || true
          node --test tests/render.test.js
        working-directory: desktop

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: udr-desktop-linux
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb
          retention-days: 30

      - name: Upload to release
        if: github.event_name == 'release' || startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          shopt -s nullglob
          for f in desktop/release/*; do
            base=$(basename "$f")
            case "$base" in
              *.AppImage|*.deb)
                echo "Uploading $base to release $TAG..."
                gh release upload "$TAG" "$f" --clobber
                ;;
              *)
                echo "Skipping $base"
                ;;
            esac
          done

  windows:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'v')
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: desktop/node_modules
          key: desktop-npm-windows-${{ matrix.arch }}-${{ hashFiles('desktop/package-lock.json', 'desktop/package.json') }}
          restore-keys: |
            desktop-npm-windows-${{ matrix.arch }}-

      - name: Install desktop dependencies
        run: npm install
        working-directory: desktop

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Sync desktop version from pyproject.toml
        run: python scripts/sync-version.py

      - name: Override version from git tag (safety net)
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG_VER="${{ github.event.release.tag_name }}"
            TAG_VER="${TAG_VER#v}"
            echo "Injecting tag version: $TAG_VER"
            python3 -c "import json,sys; pkg=json.load(open('desktop/package.json')); old=pkg['version']; pkg['version']=sys.argv[1]; json.dump(pkg, open('desktop/package.json','w'), indent=2); print(f'desktop/package.json: {old} -> {sys.argv[1]} (from tag)')" "$TAG_VER"
          else
            echo "No release tag — using pyproject.toml version"
          fi

      - name: Install UPX compressor
        shell: bash
        run: |
          scoop install upx 2>/dev/null || choco install upx -y 2>/dev/null || echo "UPX not available via scoop/choco"
          which upx && upx --version | head -1 || echo "UPX not available"

      - name: Build backend binary + Electron app
        shell: bash
        run: |
          pip install pyinstaller
          pip install -e ".[system]"
          Z3_LIB=$(python3 << 'PYEOF'
          import z3, os, sys, glob
          ext_map = {'win32': '.dll', 'cygwin': '.dll', 'darwin': '.dylib'}
          ext = ext_map.get(sys.platform, '.so')
          lib_dir = os.path.join(os.path.dirname(z3.__file__), 'lib')
          if not os.path.isdir(lib_dir):
              lib_dir = os.path.join(os.path.dirname(z3.__file__))
          matches = glob.glob(os.path.join(lib_dir, f'*z3*{ext}')) or glob.glob(os.path.join(lib_dir, f'libz3*'))
          print(matches[0] if matches else os.path.join(lib_dir, f'libz3{ext}'))
          PYEOF
          )
          UPX_FLAG=""
          which upx >/dev/null 2>&1 && UPX_FLAG="--upx-dir $(dirname $(which upx))"
          pyinstaller --onedir --noconsole --noconfirm \
            --name udr-backend \
            $UPX_FLAG \
            --add-binary "$Z3_LIB:z3/lib/" \
            --distpath backend/dist \
            --workpath ${{ runner.temp }}/pyibuild \
            backend/run.py
          pushd desktop
          npm install
          ARCH_FLAG=""
          if [[ "${{ runner.arch }}" == "ARM64" || "${{ matrix.arch }}" == "arm64" ]]; then
            ARCH_FLAG="--arm64"
          fi
          npx electron-builder --win $ARCH_FLAG --publish=never
          popd
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test built binary
        shell: bash
        run: |
          node --test tests/smoke.test.js
        working-directory: desktop

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: udr-desktop-windows-${{ matrix.arch }}
          path: |
            desktop/release/*.exe
          retention-days: 30

      - name: Upload to release
        if: github.event_name == 'release' || startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          shopt -s nullglob
          for f in desktop/release/*; do
            base=$(basename "$f")
            case "$base" in
              *.exe)
                echo "Uploading $base to release $TAG..."
                gh release upload "$TAG" "$f" --clobber
                ;;
              *)
                echo "Skipping $base"
                ;;
            esac
          done

  macos:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'v')
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: desktop/node_modules
          key: desktop-npm-macos-${{ matrix.arch }}-${{ hashFiles('desktop/package-lock.json', 'desktop/package.json') }}
          restore-keys: |
            desktop-npm-macos-${{ matrix.arch }}-

      - name: Install desktop dependencies
        run: npm install
        working-directory: desktop

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Sync desktop version from pyproject.toml
        run: python scripts/sync-version.py

      - name: Override version from git tag (safety net)
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG_VER="${{ github.event.release.tag_name }}"
            TAG_VER="${TAG_VER#v}"
            echo "Injecting tag version: $TAG_VER"
            python3 -c "import json,sys; pkg=json.load(open('desktop/package.json')); old=pkg['version']; pkg['version']=sys.argv[1]; json.dump(pkg, open('desktop/package.json','w'), indent=2); print(f'desktop/package.json: {old} -> {sys.argv[1]} (from tag)')" "$TAG_VER"
          else
            echo "No release tag — using pyproject.toml version"
          fi

      - name: Install UPX compressor
        shell: bash
        run: |
          brew install upx 2>/dev/null || echo "UPX not available via Homebrew"
          which upx && upx --version | head -1 || echo "UPX not available"

      - name: Build backend binary + Electron app
        shell: bash
        run: |
          pip install pyinstaller
          pip install -e ".[system]"
          Z3_LIB=$(python3 << 'PYEOF'
          import z3, os, sys, glob
          ext_map = {'win32': '.dll', 'cygwin': '.dll', 'darwin': '.dylib'}
          ext = ext_map.get(sys.platform, '.so')
          lib_dir = os.path.join(os.path.dirname(z3.__file__), 'lib')
          if not os.path.isdir(lib_dir):
              lib_dir = os.path.join(os.path.dirname(z3.__file__))
          matches = glob.glob(os.path.join(lib_dir, f'*z3*{ext}')) or glob.glob(os.path.join(lib_dir, f'libz3*'))
          print(matches[0] if matches else os.path.join(lib_dir, f'libz3{ext}'))
          PYEOF
          )
          UPX_FLAG=""
          which upx >/dev/null 2>&1 && UPX_FLAG="--upx-dir $(dirname $(which upx))"
          pyinstaller --onedir --noconsole --noconfirm \
            --name udr-backend \
            $UPX_FLAG \
            --add-binary "$Z3_LIB:z3/lib/" \
            --distpath backend/dist \
            --workpath ${{ runner.temp }}/pyibuild \
            backend/run.py
          pushd desktop
          npm install
          npx electron-builder --mac --publish=never
          popd
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test built binary
        shell: bash
        run: |
          node --test tests/smoke.test.js
        working-directory: desktop

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: udr-desktop-macos-${{ matrix.arch }}
          path: |
            desktop/release/*.dmg
          retention-days: 30

      - name: Upload to release
        if: github.event_name == 'release' || startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          shopt -s nullglob
          for f in desktop/release/*; do
            base=$(basename "$f")
            case "$base" in
              *.dmg)
                echo "Uploading $base to release $TAG..."
                gh release upload "$TAG" "$f" --clobber
                ;;
              *)
                echo "Skipping $base"
                ;;
            esac
          done
