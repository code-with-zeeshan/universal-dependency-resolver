# monitoring/prometheus-free.yml
# Configuration for Grafana Cloud Free
remote_write:
  - url: https://prometheus-prod.grafana.net/api/prom/push
    basic_auth:
      username: YOUR_GRAFANA_CLOUD_USERNAME
      password: YOUR_GRAFANA_CLOUD_API_KEY

scrape_configs:
  - job_name: 'udr-backend'
    static_configs:
      - targets: ['your-app.onrender.com']
    metrics_path: '/metrics'
    scrape_interval: 60s  # Reduce frequency for free tier

# monitoring/alerts-free.yml
groups:
  - name: free_tier_alerts
    rules:
      - alert: ApproachingRenderLimit
        expr: render_compute_hours_used > 600
        annotations:
          summary: "Approaching Render.com free tier limit"
      
      - alert: UpstashRedisLimit
        expr: upstash_commands_daily > 8000
        annotations:
          summary: "Approaching Upstash daily command limit"