# monitoring/prometheus.yml
# For local development or self-hosted Prometheus
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"
  - "prometheus/sli-rules.yml"

scrape_configs:
  - job_name: 'udr-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'

